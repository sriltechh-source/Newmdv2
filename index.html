<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

        <meta name="theme-color" content="#7A8B1E" />

        <meta name="apple-mobile-web-app-capable" content="yes" />

        <meta name="mobile-web-app-capable" content="yes" />

        <meta name="apple-mobile-web-app-status-bar-style" content="default" />

        <meta name="apple-mobile-web-app-title" content="Mana Hub" />

        <meta name="application-name" content="Mana Hub" />

        <meta name="description" content="Mana Hub - Your local delivery, store, and services hub" />

        <title>Mana Hub - Local Delivery & Store</title>

        <link
            rel="apple-touch-icon"
            href="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=192&h=192&fit=crop"
        />

        <link rel="icon" href="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=192&h=192&fit=crop" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />

        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <!-- Inline manifest via blob (created in JS for single-file) -->

        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }

            :root {
                --primary: #7a8b1e;
                --primary-dark: #5f6e15;
                --primary-grad: linear-gradient(135deg, #7a8b1e, #5f6e15);

                --secondary: #2e7d32;
                --accent: #ff3b30;
                --accent-glow: rgba(255, 59, 48, 0.25);

                --text: #1a1a1a;
                --text-2: #666;
                --muted: #9e9e9e;
                --inverse: #fff;

                --bg: #f7f7f7;
                --card: #fff;
                --soft: #fafafa;

                --border: #e5e5e5;
                --divider: #f0f0f0;

                --radius-s: 6px;
                --radius-m: 10px;
                --radius-l: 12px;
                --radius-pill: 999px;

                --shadow-1: 0 1px 4px rgba(0, 0, 0, 0.05);
                --shadow-2: 0 2px 8px rgba(0, 0, 0, 0.06);
                --shadow-3: 0 6px 20px rgba(0, 0, 0, 0.12);

                --glow-primary: 0 0 0 3px rgba(122, 139, 30, 0.15);
                --glow-error: 0 0 0 3px rgba(255, 59, 48, 0.2);

                --ease: cubic-bezier(0.4, 0, 0.2, 1);

                --header-h: 60px;
                --bottom-h: 64px;
            }

            html,
            body {
                height: 100%;
                width: 100%;
                overflow-x: hidden;
            }

            body {
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                font-size: 14px;
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
                overscroll-behavior-y: contain;
                padding-bottom: var(--bottom-h);
            }

            img {
                max-width: 100%;
                display: block;
            }

            button {
                font-family: inherit;
                cursor: pointer;
                border: none;
                background: none;
                color: inherit;
            }

            input,
            select,
            textarea {
                font-family: inherit;
                font-size: 14px;
                outline: none;
            }

            a {
                color: var(--primary);
                text-decoration: none;
            }

            .hidden {
                display: none !important;
            }

            .muted {
                color: var(--text-2);
                font-size: 13px;
            }

            .center {
                text-align: center;
            }

            .row {
                display: flex;
                gap: 8px;
                align-items: center;
            }

            .spread {
                justify-content: space-between;
            }

            /* SPLASH */

            .splash {
                position: fixed;
                inset: 0;
                z-index: 9999;
                background: var(--primary-grad);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                color: #fff;
                animation: fadeIn 0.3s var(--ease);
            }

            .splash-logo-wrap {
                position: relative;
                width: 120px;
                height: 120px;
                margin-bottom: 20px;
                animation: bounceIn 0.8s var(--ease);
            }

            .splash-logo {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                border: 4px solid #fff;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
                object-fit: cover;
            }

            .splash-pulse {
                position: absolute;
                inset: -10px;
                border-radius: 50%;
                border: 3px solid rgba(255, 255, 255, 0.5);
                animation: pulse 1.5s infinite;
            }

            .splash h1 {
                font-size: 32px;
                font-weight: 700;
                letter-spacing: -0.5px;
                margin-top: 8px;
            }

            .splash p {
                opacity: 0.9;
                margin-top: 6px;
                font-size: 14px;
            }

            .splash-loader {
                margin-top: 24px;
                width: 140px;
                height: 3px;
                background: rgba(255, 255, 255, 0.25);
                border-radius: 99px;
                overflow: hidden;
            }

            .splash-loader > div {
                height: 100%;
                background: #fff;
                width: 30%;
                border-radius: 99px;
                animation: loadBar 1.2s infinite;
            }

            @keyframes loadBar {
                0% {
                    margin-left: -30%;
                }
                100% {
                    margin-left: 100%;
                }
            }

            @keyframes pulse {
                0% {
                    transform: scale(1);
                    opacity: 1;
                }
                100% {
                    transform: scale(1.4);
                    opacity: 0;
                }
            }

            @keyframes bounceIn {
                0% {
                    transform: scale(0.3);
                    opacity: 0;
                }
                60% {
                    transform: scale(1.05);
                    opacity: 1;
                }
                100% {
                    transform: scale(1);
                }
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            @keyframes fadeOut {
                to {
                    opacity: 0;
                    visibility: hidden;
                }
            }

            /* HEADER */

            .app-header {
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                height: var(--header-h);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 12px;
                border-bottom: 1px solid var(--divider);
                transition: box-shadow 0.2s var(--ease);
            }

            .app-header.scrolled {
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            }

            .header-left {
                display: flex;
                align-items: center;
                gap: 10px;
                min-width: 0;
            }

            .logo-circle {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                overflow: hidden;
                border: 2px solid var(--primary);
                flex-shrink: 0;
                box-shadow: 0 2px 6px rgba(122, 139, 30, 0.3);
            }

            .logo-circle img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .brand-text {
                display: flex;
                flex-direction: column;
                min-width: 0;
            }

            .brand-text h1 {
                font-size: 16px;
                font-weight: 700;
                color: var(--text);
                letter-spacing: -0.2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .loc-chip {
                display: inline-flex;
                align-items: center;
                gap: 3px;
                font-size: 11px;
                color: var(--primary);
                font-weight: 600;
                background: rgba(122, 139, 30, 0.1);
                padding: 1px 6px;
                border-radius: 99px;
                width: fit-content;
                max-width: 120px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 2px;
            }

            .icon-btn {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.15s,
                    transform 0.12s;
            }

            .icon-btn:hover {
                background: rgba(0, 0, 0, 0.06);
            }

            .icon-btn:active {
                transform: scale(0.92);
            }

            .lang-select {
                border: 1px solid var(--border);
                background: #fff;
                padding: 5px 6px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: 600;
                color: var(--text);
                cursor: pointer;
            }

            /* MAIN */

            .app-main {
                padding: 0 0 calc(var(--bottom-h) + 80px) 0;
                min-height: calc(100vh - var(--header-h));
            }

            .page {
                display: none;
                animation: pageIn 0.25s var(--ease);
            }

            .page.active {
                display: block;
            }

            @keyframes pageIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* SECTIONS */

            .section {
                padding: 14px 12px;
            }

            .section-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 10px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                letter-spacing: -0.2px;
            }

            .section-title .more {
                font-size: 12px;
                color: var(--primary);
                font-weight: 600;
            }

            .section-title small {
                font-weight: 500;
                color: var(--text-2);
                font-size: 12px;
            }

            /* BANNER CAROUSEL */

            .banner-wrap {
                position: relative;
                border-radius: 14px;
                overflow: hidden;
                margin: 12px;
                height: 170px;
                box-shadow: var(--shadow-2);
            }

            .banner-track {
                display: flex;
                height: 100%;
                transition: transform 0.5s var(--ease);
            }

            .banner-slide {
                flex: 0 0 100%;
                height: 100%;
                position: relative;
            }

            .banner-slide img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .banner-slide .overlay {
                position: absolute;
                inset: 0;
                background: linear-gradient(180deg, transparent 40%, rgba(0, 0, 0, 0.6));
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                padding: 14px;
                color: #fff;
            }

            .banner-slide h3 {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 2px;
            }

            .banner-slide p {
                font-size: 12px;
                opacity: 0.9;
            }

            .banner-dots {
                position: absolute;
                bottom: 8px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 5px;
                z-index: 2;
            }

            .banner-dots span {
                width: 6px;
                height: 6px;
                border-radius: 99px;
                background: rgba(255, 255, 255, 0.5);
                transition: width 0.25s;
            }

            .banner-dots span.active {
                width: 18px;
                background: #fff;
            }

            /* GRID NAV 2x3 */

            .nav-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 8px 12px;
            }

            .nav-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: var(--radius-l);
                padding: 14px 8px;
                text-align: center;
                transition: all 0.2s var(--ease);
                box-shadow: var(--shadow-1);
                position: relative;
                overflow: hidden;
            }

            .nav-card:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-3);
                border-color: var(--primary);
            }

            .nav-card:active {
                transform: scale(0.97);
            }

            .nav-card .ico-wrap {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background: rgba(122, 139, 30, 0.1);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 6px;
            }

            .nav-card svg {
                stroke: var(--primary);
            }

            .nav-card span {
                display: block;
                font-size: 12px;
                font-weight: 600;
                color: var(--text);
            }

            .nav-card .glow {
                position: absolute;
                inset: 0;
                background: radial-gradient(circle at center, rgba(122, 139, 30, 0.15), transparent 60%);
                opacity: 0;
                transition: opacity 0.3s;
            }

            .nav-card:hover .glow {
                opacity: 1;
            }

            /* TIMER BANNER */

            .timer-banner {
                margin: 12px;
                background: linear-gradient(135deg, #ff3b30, #c0392b);
                border-radius: 14px;
                padding: 14px;
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: space-between;
                box-shadow: 0 4px 14px rgba(255, 59, 48, 0.3);
                overflow: hidden;
                position: relative;
            }

            .timer-banner::before {
                content: "";
                position: absolute;
                inset: -50% -10% auto auto;
                width: 200px;
                height: 200px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 50%;
            }

            .timer-banner h4 {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 2px;
                position: relative;
            }

            .timer-banner p {
                font-size: 12px;
                opacity: 0.9;
                position: relative;
            }

            .timer-clock {
                display: flex;
                gap: 5px;
                position: relative;
            }

            .timer-clock div {
                background: rgba(255, 255, 255, 0.2);
                padding: 5px 7px;
                border-radius: 7px;
                font-weight: 700;
                font-size: 13px;
                min-width: 32px;
                text-align: center;
                backdrop-filter: blur(6px);
            }

            /* SERVICE CARDS */

            .service-card {
                background: var(--card);
                border-radius: var(--radius-l);
                overflow: hidden;
                box-shadow: var(--shadow-2);
                margin-bottom: 12px;
                border: 1px solid var(--border);
                transition: transform 0.2s var(--ease);
            }

            .service-card:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-3);
            }

            .service-card .img {
                height: 140px;
                overflow: hidden;
                position: relative;
            }

            .service-card .img img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.4s;
            }

            .service-card:hover .img img {
                transform: scale(1.05);
            }

            .service-card .body {
                padding: 12px;
            }

            .service-card h3 {
                font-size: 15px;
                font-weight: 700;
                margin-bottom: 4px;
            }

            .service-card p {
                font-size: 12px;
                color: var(--text-2);
                margin-bottom: 8px;
                line-height: 1.5;
            }

            .service-card .actions {
                display: flex;
                gap: 8px;
            }

            /* TIERS */

            .tiers {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
                margin-top: 10px;
            }

            .tier {
                background: var(--card);
                border: 1.5px solid var(--border);
                border-radius: 12px;
                padding: 12px 8px;
                text-align: center;
                transition: 0.2s var(--ease);
                position: relative;
                overflow: hidden;
            }

            .tier:hover {
                transform: translateY(-3px);
                border-color: var(--primary);
            }

            .tier.gold {
                background: linear-gradient(135deg, #fff8e1, #fff);
                border-color: #ffc107;
            }

            .tier.diamond {
                background: linear-gradient(135deg, #e1f5fe, #fff);
                border-color: #03a9f4;
            }

            .tier .badge {
                font-size: 10px;
                font-weight: 700;
                padding: 2px 6px;
                border-radius: 99px;
                background: rgba(0, 0, 0, 0.06);
                display: inline-block;
                margin-bottom: 6px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .tier.silver .badge {
                background: #eceff1;
                color: #546e7a;
            }

            .tier.gold .badge {
                background: #ffc107;
                color: #fff;
            }

            .tier.diamond .badge {
                background: #03a9f4;
                color: #fff;
            }

            .tier h4 {
                font-size: 13px;
                font-weight: 700;
            }

            .tier .price {
                font-size: 16px;
                color: var(--primary);
                font-weight: 700;
                margin: 4px 0;
            }

            .tier ul {
                list-style: none;
                font-size: 11px;
                color: var(--text-2);
                text-align: left;
                margin-top: 6px;
            }

            .tier ul li {
                padding: 2px 0;
                display: flex;
                gap: 4px;
                align-items: flex-start;
            }

            .tier ul li::before {
                content: "•";
                color: var(--primary);
                font-weight: 700;
            }

            /* PRODUCT CARDS */

            .products-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 0 12px;
            }

            .product-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: var(--radius-l);
                overflow: hidden;
                box-shadow: var(--shadow-2);
                transition: 0.2s var(--ease);
                position: relative;
            }

            .product-card:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-3);
            }

            .product-img {
                aspect-ratio: 1/1;
                overflow: hidden;
                background: #f5f5f5;
                position: relative;
            }

            .product-img img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.3s;
            }

            .product-card:hover .product-img img {
                transform: scale(1.03);
            }

            .product-badge {
                position: absolute;
                top: 6px;
                left: 6px;
                background: #e8f5e9;
                color: #2e7d32;
                font-size: 10px;
                font-weight: 700;
                padding: 2px 6px;
                border-radius: 6px;
                z-index: 2;
            }

            .product-wish {
                position: absolute;
                top: 6px;
                right: 6px;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
                transition: 0.15s;
                z-index: 2;
            }

            .product-wish.active svg {
                fill: var(--accent);
                stroke: var(--accent);
            }

            .product-wish:active {
                transform: scale(0.85);
            }

            .product-info {
                padding: 10px;
            }

            .product-info h4 {
                font-size: 13px;
                font-weight: 600;
                line-height: 1.3;
                margin-bottom: 4px;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                min-height: 34px;
            }

            .product-price {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 6px;
            }

            .today-price {
                color: var(--primary);
                font-weight: 700;
                font-size: 13px;
                background: rgba(122, 139, 30, 0.1);
                padding: 2px 6px;
                border-radius: 5px;
            }

            .qty-row {
                display: flex;
                align-items: center;
                gap: 5px;
                margin-bottom: 6px;
            }

            .qty-row input {
                flex: 1;
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 5px 7px;
                font-size: 12px;
                width: 100%;
                min-width: 0;
            }

            .qty-row input:focus {
                border-color: var(--primary);
                box-shadow: var(--glow-primary);
            }

            .btn-add {
                width: 100%;
                background: var(--primary-grad);
                color: #fff;
                font-weight: 600;
                font-size: 12px;
                padding: 7px;
                border-radius: 8px;
                transition: 0.15s;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
                box-shadow: 0 2px 6px rgba(122, 139, 30, 0.3);
            }

            .btn-add:hover {
                filter: brightness(1.05);
            }

            .btn-add:active {
                transform: scale(0.97);
            }

            /* CATEGORY TABS */

            .cat-tabs {
                display: flex;
                gap: 8px;
                padding: 8px 12px;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }

            .cat-tabs::-webkit-scrollbar {
                display: none;
            }

            .cat-tab {
                flex-shrink: 0;
                padding: 7px 14px;
                border-radius: 99px;
                background: #fff;
                border: 1px solid var(--border);
                font-size: 13px;
                font-weight: 600;
                color: var(--text-2);
                scroll-snap-align: start;
                transition: 0.15s;
            }

            .cat-tab.active {
                background: var(--primary-grad);
                color: #fff;
                border-color: var(--primary);
                box-shadow: 0 2px 8px rgba(122, 139, 30, 0.3);
            }

            /* QUICK ACCESS */

            .quick-access {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                padding: 0 12px;
            }

            .quick-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 10px 4px;
                text-align: center;
                transition: 0.2s;
            }

            .quick-card:hover {
                border-color: var(--primary);
                transform: translateY(-2px);
            }

            .quick-card .ico {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: rgba(122, 139, 30, 0.1);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 4px;
            }

            .quick-card span {
                font-size: 10px;
                font-weight: 600;
                display: block;
                line-height: 1.2;
            }

            /* TESTIMONIALS */

            .testimonial-track {
                display: flex;
                gap: 10px;
                overflow-x: auto;
                padding: 0 12px;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }

            .testimonial-track::-webkit-scrollbar {
                display: none;
            }

            .testimonial {
                flex: 0 0 280px;
                background: #fff;
                border-radius: 12px;
                padding: 12px;
                box-shadow: var(--shadow-2);
                scroll-snap-align: start;
                border: 1px solid var(--border);
            }

            .testimonial .who {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 8px;
            }

            .testimonial .who img {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                object-fit: cover;
            }

            .testimonial .who h5 {
                font-size: 13px;
                font-weight: 600;
            }

            .testimonial .stars {
                color: #2e7d32;
                font-size: 11px;
                display: flex;
                gap: 1px;
            }

            .testimonial p {
                font-size: 12px;
                color: var(--text-2);
                line-height: 1.5;
            }

            /* FORMS */

            .form {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 14px;
                margin: 0 12px;
            }

            .form .field {
                margin-bottom: 10px;
            }

            .form label {
                display: block;
                font-size: 12px;
                font-weight: 600;
                color: var(--text);
                margin-bottom: 5px;
            }

            .form input,
            .form select,
            .form textarea {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 9px 11px;
                background: #fff;
                transition: 0.15s;
            }

            .form input:focus,
            .form select:focus,
            .form textarea:focus {
                border-color: var(--primary);
                box-shadow: var(--glow-primary);
            }

            .form textarea {
                resize: vertical;
                min-height: 70px;
            }

            /* BUTTONS */

            .btn {
                padding: 10px 16px;
                border-radius: 10px;
                font-weight: 600;
                font-size: 14px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                transition: 0.15s;
                min-height: 42px;
            }

            .btn-primary {
                background: var(--primary-grad);
                color: #fff;
                box-shadow: 0 2px 6px rgba(122, 139, 30, 0.3);
            }

            .btn-primary:hover {
                filter: brightness(1.05);
            }

            .btn-primary:active {
                transform: scale(0.96);
            }

            .btn-secondary {
                background: #f1f1f1;
                color: #333;
            }

            .btn-block {
                width: 100%;
            }

            .btn-whats {
                background: #25d366;
                color: #fff;
                box-shadow: 0 2px 8px rgba(37, 211, 102, 0.4);
            }

            /* MODALS */

            .modal {
                position: fixed;
                inset: 0;
                z-index: 9000;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: flex-end;
                justify-content: center;
                animation: fadeIn 0.2s var(--ease);
                backdrop-filter: blur(4px);
            }

            .modal.center {
                align-items: center;
                padding: 16px;
            }

            .modal-card {
                background: #fff;
                border-radius: 16px 16px 0 0;
                width: 100%;
                max-width: 480px;
                max-height: 88vh;
                overflow-y: auto;
                animation: slideUp 0.25s var(--ease);
            }

            .modal.center .modal-card {
                border-radius: 16px;
                animation: scaleIn 0.25s var(--ease);
            }

            .modal-card.small {
                max-width: 360px;
            }

            @keyframes slideUp {
                from {
                    transform: translateY(100%);
                }
                to {
                    transform: translateY(0);
                }
            }

            @keyframes scaleIn {
                from {
                    transform: scale(0.92);
                    opacity: 0;
                }
                to {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            .modal-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 14px 8px;
                border-bottom: 1px solid var(--divider);
            }

            .modal-header h2 {
                font-size: 17px;
                font-weight: 700;
            }

            .modal-body {
                padding: 14px;
            }

            .modal-body h2 {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 6px;
            }

            .welcome-hero {
                height: 160px;
                overflow: hidden;
            }

            .welcome-hero img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .welcome-features {
                list-style: none;
                margin: 12px 0;
            }

            .welcome-features li {
                display: flex;
                gap: 8px;
                align-items: center;
                font-size: 13px;
                padding: 5px 0;
                color: var(--text-2);
            }

            .welcome-features svg {
                flex-shrink: 0;
                width: 18px;
                height: 18px;
            }

            .btn-row {
                display: flex;
                gap: 8px;
                margin-top: 14px;
            }

            .btn-row .btn {
                flex: 1;
            }

            /* LOCATION LIST */

            .location-list {
                max-height: 400px;
                overflow-y: auto;
            }

            .location-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 11px 8px;
                border-bottom: 1px solid var(--divider);
                cursor: pointer;
                border-radius: 8px;
                transition: background 0.15s;
            }

            .location-item:hover,
            .location-item.active {
                background: rgba(122, 139, 30, 0.08);
            }

            .location-item .info {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .location-item .pin {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                background: rgba(122, 139, 30, 0.12);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }

            .location-item h4 {
                font-size: 13px;
                font-weight: 600;
            }

            .location-item small {
                font-size: 11px;
                color: var(--text-2);
            }

            .location-item.active::after {
                content: "✓";
                color: var(--primary);
                font-weight: 700;
                font-size: 18px;
            }

            /* GEO ICON */

            .geo-icon-wrap {
                position: relative;
                width: 80px;
                height: 80px;
                margin: 0 auto 14px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .geo-pulse {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                border: 3px solid var(--primary);
                animation: pulse 1.5s infinite;
            }

            /* SEARCH OVERLAY */

            .search-overlay {
                position: fixed;
                inset: 0;
                z-index: 9100;
                background: #fff;
                display: flex;
                flex-direction: column;
                animation: fadeIn 0.2s var(--ease);
            }

            .search-bar-wrap {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 10px 12px;
                border-bottom: 1px solid var(--divider);
                background: #fff;
                position: sticky;
                top: 0;
            }

            .search-bar-wrap input {
                flex: 1;
                border: none;
                font-size: 15px;
                padding: 6px;
            }

            .search-results {
                flex: 1;
                overflow-y: auto;
                padding: 8px 12px;
            }

            .search-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px;
                border-bottom: 1px solid var(--divider);
                cursor: pointer;
                border-radius: 8px;
                transition: background 0.15s;
            }

            .search-item:hover {
                background: var(--soft);
            }

            .search-item img {
                width: 42px;
                height: 42px;
                border-radius: 8px;
                object-fit: cover;
            }

            .search-item h5 {
                font-size: 13px;
                font-weight: 600;
            }

            .search-item small {
                font-size: 11px;
                color: var(--text-2);
            }

            /* FLOATING BUTTONS */

            .whats-float {
                position: fixed;
                bottom: calc(var(--bottom-h) + 16px);
                right: 14px;
                width: 54px;
                height: 54px;
                border-radius: 50%;
                background: #25d366;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 16px rgba(37, 211, 102, 0.5);
                z-index: 80;
                transition: 0.2s;
                animation: beating 2s infinite;
            }

            .whats-float:active {
                transform: scale(0.92);
            }

            @keyframes beating {
                0%,
                100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.08);
                }
            }

            .float-btn {
                position: fixed;
                right: 14px;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: var(--primary-grad);
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 14px rgba(122, 139, 30, 0.4);
                z-index: 79;
                transition: 0.2s;
            }

            .cart-float {
                bottom: calc(var(--bottom-h) + 80px);
            }

            .wish-float {
                bottom: calc(var(--bottom-h) + 140px);
                background: linear-gradient(135deg, #ff3b30, #c0392b);
                box-shadow: 0 4px 14px rgba(255, 59, 48, 0.4);
            }

            .float-count {
                position: absolute;
                top: -4px;
                right: -4px;
                background: #ff3b30;
                color: #fff;
                font-size: 10px;
                font-weight: 700;
                width: 20px;
                height: 20px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 2px solid #fff;
            }

            /* BOTTOM NAV */

            .bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: var(--bottom-h);
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
                border-top: 1px solid var(--divider);
                display: flex;
                justify-content: space-around;
                align-items: center;
                z-index: 90;
                padding-bottom: env(safe-area-inset-bottom);
            }

            .nav-item {
                flex: 1;
                height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2px;
                color: var(--muted);
                position: relative;
                transition: 0.2s;
                padding: 6px 0;
            }

            .nav-item span {
                font-size: 10px;
                font-weight: 600;
            }

            .nav-item.active {
                color: var(--primary);
            }

            .nav-item.active::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 30px;
                height: 3px;
                background: var(--primary);
                border-radius: 0 0 4px 4px;
            }

            .nav-item:active {
                transform: scale(0.92);
            }

            .nav-badge {
                position: absolute;
                top: 6px;
                right: 18px;
                background: #ff3b30;
                color: #fff;
                font-size: 9px;
                font-weight: 700;
                padding: 1px 5px;
                border-radius: 99px;
                min-width: 16px;
                text-align: center;
            }

            /* TOAST */

            .toast {
                position: fixed;
                bottom: calc(var(--bottom-h) + 80px);
                left: 50%;
                transform: translateX(-50%);
                background: #1a1a1a;
                color: #fff;
                padding: 10px 16px;
                border-radius: 99px;
                font-size: 13px;
                font-weight: 500;
                z-index: 9999;
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
                animation: toastIn 0.25s var(--ease);
            }

            @keyframes toastIn {
                from {
                    opacity: 0;
                    transform: translate(-50%, 10px);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, 0);
                }
            }

            /* THEME PANEL */

            .theme-panel {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: #fff;
                z-index: 9050;
                border-radius: 18px 18px 0 0;
                padding: 14px;
                box-shadow: 0 -6px 30px rgba(0, 0, 0, 0.15);
                animation: slideUp 0.3s var(--ease);
            }

            .theme-head {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
            }

            .theme-head h3 {
                font-size: 16px;
                font-weight: 700;
            }

            .theme-grid {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 8px;
            }

            .theme-swatch {
                aspect-ratio: 1;
                border-radius: 12px;
                cursor: pointer;
                border: 3px solid transparent;
                transition: 0.2s;
                position: relative;
                overflow: hidden;
            }

            .theme-swatch:hover {
                transform: scale(1.05);
            }

            .theme-swatch.active {
                border-color: #1a1a1a;
                box-shadow: var(--shadow-3);
            }

            .theme-swatch.active::after {
                content: "✓";
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
                font-weight: 700;
                font-size: 18px;
                text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
            }

            /* CART/WISHLIST PAGE */

            .cart-item {
                display: flex;
                gap: 10px;
                background: #fff;
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 10px;
                margin: 0 12px 10px;
            }

            .cart-item img {
                width: 70px;
                height: 70px;
                border-radius: 8px;
                object-fit: cover;
            }

            .cart-item .ci-info {
                flex: 1;
                min-width: 0;
            }

            .cart-item h5 {
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 3px;
            }

            .cart-item .ci-meta {
                font-size: 11px;
                color: var(--text-2);
            }

            .cart-item .ci-actions {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                justify-content: space-between;
                gap: 5px;
            }

            .qty-stepper {
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .qty-stepper button {
                width: 24px;
                height: 24px;
                border: 1px solid var(--border);
                border-radius: 5px;
                font-weight: 600;
                background: #fff;
            }

            .qty-stepper input {
                width: 40px;
                text-align: center;
                border: 1px solid var(--border);
                border-radius: 5px;
                padding: 3px;
                font-size: 12px;
            }

            .icon-del {
                width: 28px;
                height: 28px;
                border-radius: 6px;
                color: var(--accent);
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .empty-state {
                text-align: center;
                padding: 50px 20px;
                color: var(--text-2);
            }

            .empty-state svg {
                margin-bottom: 10px;
                opacity: 0.5;
            }

            .empty-state h3 {
                font-size: 16px;
                font-weight: 600;
                color: var(--text);
                margin-bottom: 5px;
            }

            /* QUICK VIEW */

            .qv-images {
                height: 280px;
                overflow: hidden;
                background: #f5f5f5;
                position: relative;
            }

            .qv-images img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .qv-thumbs {
                display: flex;
                gap: 6px;
                padding: 8px 12px;
                overflow-x: auto;
            }

            .qv-thumbs::-webkit-scrollbar {
                display: none;
            }

            .qv-thumb {
                width: 60px;
                height: 60px;
                border-radius: 8px;
                overflow: hidden;
                border: 2px solid transparent;
                flex-shrink: 0;
                cursor: pointer;
            }

            .qv-thumb.active {
                border-color: var(--primary);
            }

            .qv-thumb img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .qv-body {
                padding: 12px;
            }

            .qv-body h2 {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 6px;
            }

            .qv-body .desc {
                font-size: 13px;
                color: var(--text-2);
                margin: 8px 0;
            }

            /* MORE PAGE */

            .more-section {
                background: #fff;
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 14px;
                margin: 0 12px 12px;
            }

            .more-section h3 {
                font-size: 14px;
                font-weight: 700;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .more-link {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 0;
                border-bottom: 1px solid var(--divider);
                cursor: pointer;
                font-size: 13px;
                font-weight: 500;
            }

            .more-link:last-child {
                border-bottom: none;
            }

            .more-link .left {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .more-link svg {
                flex-shrink: 0;
            }

            .brand-card {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px;
                background: var(--soft);
                border-radius: 10px;
                margin-bottom: 6px;
            }

            .brand-card h4 {
                font-size: 13px;
                font-weight: 700;
                color: var(--primary);
            }

            .brand-card small {
                font-size: 11px;
                color: var(--text-2);
            }

            /* GALLERY */

            .gallery {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
                padding: 0 12px;
            }

            .gallery img {
                width: 100%;
                aspect-ratio: 1;
                object-fit: cover;
                border-radius: 8px;
                cursor: pointer;
                transition: 0.2s;
            }

            .gallery img:hover {
                transform: scale(1.03);
                box-shadow: var(--shadow-2);
            }

            /* RIPPLE for CTA glow */

            .glow-pulse {
                box-shadow: 0 0 0 0 rgba(122, 139, 30, 0.5);
                animation: glowPulse 2s infinite;
            }

            @keyframes glowPulse {
                0% {
                    box-shadow: 0 0 0 0 rgba(122, 139, 30, 0.5);
                }
                70% {
                    box-shadow: 0 0 0 12px rgba(122, 139, 30, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(122, 139, 30, 0);
                }
            }

            /* SKELETON */

            .skel {
                background: linear-gradient(90deg, #eee, #f5f5f5, #eee);
                background-size: 200% 100%;
                animation: shim 1.2s infinite;
                border-radius: 8px;
            }

            @keyframes shim {
                0% {
                    background-position: 200% 0;
                }
                100% {
                    background-position: -200% 0;
                }
            }

            /* RESPONSIVE */

            @media (min-width: 768px) {
                body {
                    max-width: 520px;
                    margin: 0 auto;
                    background: #e9e9e9;
                    box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
                }

                .bottom-nav,
                .whats-float,
                .float-btn {
                    max-width: 520px;
                    margin: 0 auto;
                    left: 50%;
                    transform: translateX(-50%);
                }

                .whats-float,
                .float-btn {
                    transform: none;
                    left: auto;
                }
            }
        </style>
    </head>

            /* ---------- STORAGE ---------- */

            const Store = {
                save() {
                    try {
                        localStorage.setItem(
                            "mh_state",
                            JSON.stringify({
                                loc: State.currentLocation.id,
                                lang: State.lang,
                                theme: State.theme,

                                cart: State.cart,
                                wishlist: State.wishlist,
                                marketCart: State.marketCart,

                                marketWish: State.marketWish,
                                shCart: State.shCart,
                                shWish: State.shWish,
                            })
                        );
                    } catch (e) {}
                },

                load() {
                    try {
                        const d = JSON.parse(localStorage.getItem("mh_state") || "{}");

                        if (d.loc) {
                            const l = LOCATIONS.find((x) => x.id === d.loc);
                            if (l) State.currentLocation = l;
                        }

                        if (d.lang) State.lang = d.lang;

                        if (d.theme) State.theme = d.theme;

                        if (d.cart) State.cart = d.cart;

                        if (d.wishlist) State.wishlist = d.wishlist;

                        if (d.marketCart) State.marketCart = d.marketCart;

                        if (d.marketWish) State.marketWish = d.marketWish;

                        if (d.shCart) State.shCart = d.shCart;

                        if (d.shWish) State.shWish = d.shWish;
                    } catch (e) {}
                },
            };

            /* ---------- LOCATION (GEO) ---------- */

            const Geo = {
                watch: null,

                request() {
                    return new Promise((res, rej) => {
                        if (!navigator.geolocation) {
                            rej("Not supported");
                            return;
                        }

                        navigator.geolocation.getCurrentPosition(
                            (p) => {
                                State.geo = {
                                    lat: p.coords.latitude,
                                    lng: p.coords.longitude,

                                    accuracy: p.coords.accuracy,
                                    altitude: p.coords.altitude,

                                    altitudeAccuracy: p.coords.altitudeAccuracy,
                                    heading: p.coords.heading,

                                    speed: p.coords.speed,
                                    ts: p.timestamp,
                                };

                                res(State.geo);
                            },
                            (err) => rej(err),
                            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                        );
                    });
                },

                watch_start() {
                    if (!navigator.geolocation || this.watch) return;

                    this.watch = navigator.geolocation.watchPosition(

            /* ---------- WHATSAPP ---------- */

            const WA = {

                    return State.currentLocation.phone;
                },

                send(message) {
                    const num = this.number();

                    const text = encodeURIComponent(
                        message + Geo.formatForMessage() + `\n\n🏷️ *Selected Location*: ${State.currentLocation.name}`
                    );

                    const url = `https://wa.me/91${num}?text=${text}`;

                    // detect inbuilt browsers

                    const ua = navigator.userAgent || "";

                    const inApp = /Instagram|FBAN|FBAV|Twitter/i.test(ua);

                    if (inApp) {
                        // show prompt to open in default browser

                init() {
                    // initial state

                    this.stack.push({ type: "page", page: "home" });

                    window.addEventListener("popstate", (e) => this.onPop(e));
                },

                push(state) {
                    // dedupe

                    const top = this.stack[this.stack.length - 1];

                    if (top && top.type === state.type && top.page === state.page && top.modal === state.modal) return;

                    this.stack.push(state);

                    history.pushState(state, "", state.page ? "#" + state.page : "#");
                },

                onPop(e) {
                    // close modals first

                    if (App.closeTopOverlay()) return;

                    // pop state

                    if (this.stack.length > 1) {
                        this.stack.pop();

                        const prev = this.stack[this.stack.length - 1];

                        if (prev.type === "page") {
                            App._renderPage(prev.page, false);
                        }

            function startBannerCarousel(id, total) {
                const wrap = document.getElementById(id);
                if (!wrap) return;

                const track = wrap.querySelector(".banner-track");

                const dots = wrap.querySelectorAll(".banner-dots span");

                let i = 0;

                if (wrap._timer) clearInterval(wrap._timer);

                wrap._timer = setInterval(() => {
                    i = (i + 1) % total;

                    track.style.transform = `translateX(-${i * 100}%)`;

                    dots.forEach((d, idx) => d.classList.toggle("active", idx === i));
                }, 3500);
            }

            function startTimer() {
                const el = document.getElementById("timerClock");
                if (!el) return;

                const end = Date.now() + 6 * 3600 * 1000;

                if (window._timerInt) clearInterval(window._timerInt);

                window._timerInt = setInterval(() => {
                    const d = Math.max(0, end - Date.now());

                    const h = String(Math.floor(d / 3600000)).padStart(2, "0");

                    const m = String(Math.floor(d / 60000) % 60).padStart(2, "0");

                    const s = String(Math.floor(d / 1000) % 60).padStart(2, "0");

                    el.innerHTML = `<div>${h}</div><div>${m}</div><div>${s}</div>`;
                }, 1000);
            }

                _registerPWA() {
                    // create manifest blob

                    const manifest = {
                        name: "Mana Hub - Local Delivery & Store",

                        short_name: "Mana Hub",

                        description: "Local delivery, store, market, events & services",

                        start_url: ".",

                        scope: ".",

                        display: "standalone",

                                sizes: "192x192",
                                type: "image/jpeg",
                                purpose: "any maskable",
                            },

                            {
                                src: "https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=512&h=512&fit=crop",
                                sizes: "512x512",
                                type: "image/jpeg",
                                purpose: "any maskable",
                            },
                        ],
                    };

                    const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });

                    const url = URL.createObjectURL(blob);

                    const link = document.createElement("link");

                    link.rel = "manifest";
                    link.href = url;

                    document.head.appendChild(link);

                    // service worker (inline)

                    if ("serviceWorker" in navigator) {
                        const swCode = `

        const CACHE='manahub-v1';

        self.addEventListener('install',e=>{self.skipWaiting()});

        self.addEventListener('activate',e=>{self.clients.claim()});

        self.addEventListener('fetch',e=>{

          if(e.request.method!=='GET')return;

          e.respondWith(

            caches.open(CACHE).then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{

              if(res.ok)c.put(e.request,res.clone());return res;

            }).catch(()=>c.match('/'))))

          );

        });

      `;

                        const swBlob = new Blob([swCode], { type: "application/javascript" });

                        const swUrl = URL.createObjectURL(swBlob);

                        navigator.serviceWorker.register(swUrl).catch(() => {});
                    }

                addToCart(ctx, id) {

                    if (!it) return;

                    const qtyEl = document.getElementById(`qty_${ctx}_${id}`);

                    const qty = qtyEl ? qtyEl.value : "1";

                    const cart = getCart(ctx);

                    cart[id] = { ...it, qty, _ctx: ctx };

                    Store.save();

                    this.toast(`${it.name} added`);

                    this.updateBadges();

                    this._renderPage(State.currentPage, false);
                },

                toggleWish(ctx, id) {
                    const it = getItemById(ctx, id);
                    if (!it) return;

                    const wish = getWish(ctx);

                    if (wish[id]) {
                        delete wish[id];
                        this.toast("Removed from wishlist");
                    } else {
                        wish[id] = { ...it, _ctx: ctx };
                        this.toast("Added to wishlist");

                    Store.save();
                    this.updateBadges();

                    this._renderPage(State.currentPage, false);

                    const cart = getCart(ctx);
                    if (!cart[id]) return;

                    let q = parseInt(cart[id].qty) || 1;
                    q += delta;
                    if (q < 1) q = 1;
                    cart[id].qty = q;

                    Store.save();
                    renderCart();
                    this.updateBadges();
                },

                    const cart = getCart(ctx);

                    cart[id].qty = v;

                        Object.keys(State.cart).length +
                        Object.keys(State.marketCart).length +
                        Object.keys(State.shCart).length;

                    const wTotal =
                        Object.keys(State.wishlist).length +
                        Object.keys(State.marketWish).length +
                        Object.keys(State.shWish).length;

                    const cb = document.getElementById("navCartBadge");

                    cb.textContent = total;
                    cb.classList.toggle("hidden", total === 0);

                    document.getElementById("cartCount").textContent = total;

                    document.getElementById("wishCount").textContent = wTotal;

                    document
                        .getElementById("cartFloat")
                        .classList.toggle(
                            "hidden",
                            total === 0 || (State.currentPage !== "store" && State.currentPage !== "localmarket")
                        );

                    document
                        .getElementById("wishFloat")
                        .classList.toggle(
                            "hidden",
                            wTotal === 0 || (State.currentPage !== "store" && State.currentPage !== "localmarket")
                        );
                },

                /* QUICK VIEW */

                quickView(ctx, id) {
                    const it = getItemById(ctx, id);
                    if (!it) return;

                    State.quickViewItem = { ...it, _ctx: ctx };

                    this.go("quickview");
                },

                setQVImage(i, src) {
                    document.getElementById("qvMainImg").src = src;

                    document.querySelectorAll(".qv-thumb").forEach((t, idx) => t.classList.toggle("active", idx === i));
                },

                buyNowQV(form, id) {
                    const fd = new FormData(form);

                    const it = State.quickViewItem;

                    const msg = `🛒 *Buy Now Order*\n\n*Product*: ${it.name}\n*Quantity*: ${fd.get("qty")} ${it.unit}\n*Today's Price* applicable\n\n*Customer Details*\n• Name: ${fd.get("name")}\n• Phone: ${fd.get("phone")}\n• Address: ${fd.get("address")}`;

                    WA.send(msg);
                },

                /* CART ACTIONS */

                placeOrder(form) {
                    const fd = new FormData(form);

                    const items = Object.values(State.cart)
                        .concat(Object.values(State.marketCart))
                        .concat(Object.values(State.shCart));

                    const list = items.map((i, n) => `${n + 1}. ${i.name} - Qty: ${i.qty} ${i.unit}`).join("\n");

                    const isGift = document.getElementById("giftCheck")?.checked;

                    const msg = `🛒 *New Order ${isGift ? "(GIFT)" : ""}*\n\n*Items*:\n${list}\n\n*Customer*\n• Name: ${fd.get("name")}\n• Phone: ${fd.get("phone")}\n• Address: ${fd.get("address")}\n• Notes: ${fd.get("notes") || "-"}`;

                    WA.send(msg);
                },

                shareCart() {
                    const items = Object.values(State.cart).concat(Object.values(State.marketCart));

                    const list = items.map((i) => `• ${i.name} x ${i.qty}`).join("\n");

                    const msg = `Check out my Mana Hub cart:\n\n${list}\n\nShop at: www.mana.delivery`;

                    WA.send(msg);
                },

                /* SERVICE BOOKINGS */

                bookService(name) {
                    const html = `

      <div class="modal-card">

        <div class="modal-header"><h2>Book ${name}</h2><button class="icon-btn" onclick="App.closeTopOverlay()">${ICO.back}</button></div>

        <div class="modal-body">

          <form class="form" style="border:none;padding:0;margin:0" onsubmit="event.preventDefault();App.submitServiceForm(this,'${name}')">

            <div class="field"><label>Your Name</label><input name="name" required></div>

            <div class="field"><label>Phone</label><input name="phone" type="tel" required></div>

            <div class="field"><label>Address</label><textarea name="address" required></textarea></div>

            <div class="field"><label>Date / When</label><input name="date" type="date"></div>

            <div class="field"><label>Notes</label><textarea name="notes"></textarea></div>

            <button class="btn btn-whats btn-block">${ICO.whats} Send Booking</button>

          </form>

        </div>

      </div>`;

                    this.showModal(html);
                },

                submitServiceForm(form, name) {
                    const fd = new FormData(form);

                    const msg = `📋 *Service Booking: ${name}*\n\n• Name: ${fd.get("name")}\n• Phone: ${fd.get("phone")}\n• Address: ${fd.get("address")}\n• Date: ${fd.get("date") || "ASAP"}\n• Notes: ${fd.get("notes") || "-"}`;

                    WA.send(msg);
                },

                subscribe(plan) {
                    const msg = `💎 *Subscription Request*\n\n*Plan*: ${plan}\n\nPlease share complete details and pricing.`;

                    WA.send(msg);
                },

                viewGiftPricing() {
                    this.bookService("Surprise Gift");
                },

                openBookingForm(name) {
                    this.bookService(name);
                },

                openJoinForm(role) {
                    const html = `

      <div class="modal-card">

        <div class="modal-header"><h2>Apply: ${role}</h2><button class="icon-btn" onclick="App.closeTopOverlay()">${ICO.back}</button></div>

        <div class="modal-body">

          <form class="form" style="border:none;padding:0;margin:0" onsubmit="event.preventDefault();App.submitJoinForm(this,'${role}')">

            <div class="field"><label>Full Name</label><input name="name" required></div>

            <div class="field"><label>Phone</label><input name="phone" type="tel" required></div>

            <div class="field"><label>Age</label><input name="age" type="number"></div>

            <div class="field"><label>Address</label><textarea name="address" required></textarea></div>

            <div class="field"><label>Experience</label><textarea name="exp"></textarea></div>

            <button class="btn btn-whats btn-block">${ICO.whats} Submit Application</button>

          </form>

        </div>

      </div>`;

                    this.showModal(html);
                },

                submitJoinForm(form, role) {
                    const fd = new FormData(form);

                    const msg = `🤝 *Join Application: ${role}*\n\n• Name: ${fd.get("name")}\n• Phone: ${fd.get("phone")}\n• Age: ${fd.get("age") || "-"}\n• Address: ${fd.get("address")}\n• Experience: ${fd.get("exp") || "-"}`;

                    WA.send(msg);
                },

                openEventForm(name) {
                    this.bookService(name);
                },

                submitBusinessForm(form) {
                    const fd = new FormData(form);

                    const msg = `🏢 *Business Delivery Partner Request*\n\n• Business: ${fd.get("business")}\n• Contact: ${fd.get("name")}\n• Phone: ${fd.get("phone")}\n• Type: ${fd.get("type")}\n• Notes: ${fd.get("notes") || "-"}`;

                    WA.send(msg);
                },

                /* MARKET TAB */

                setMarketTab(t) {
                    State.marketTab = t;
                    renderLocalMarket();
                },

                /* STORE FILTERS */

                filterStoreCat(cat) {
                    document
                        .querySelectorAll("#storeCatTabs .cat-tab")
                        .forEach((t) => t.classList.toggle("active", t.dataset.cat === cat));

                    document.querySelectorAll(".store-cat").forEach((c) => {
                        c.style.display = cat === "all" || c.dataset.cat === cat ? "" : "none";
                    });
                },

                filterStore(q) {
                    q = q.toLowerCase();

                    document.querySelectorAll("#page-store .product-card").forEach((c) => {
                        const t = c.querySelector("h4").textContent.toLowerCase();

                        c.style.display = t.includes(q) ? "" : "none";
                    });
                },

                /* CONTACT/MORE */

                callNow() {
                    window.location.href = "tel:+91" + WA.number();
                },

                openWhatsAppGeneral() {
                    WA.send("Hello, I have a query.");
                },

                copyText(t) {
                    navigator.clipboard?.writeText(t);
                    this.toast("Copied!");
                },

                copyLoc() {
                    const v = document.getElementById("locText").value;

                    this.copyText(v);
                },

                shareLoc() {
                    const g = State.geo;

                    if (!g) {
                        this.toast("Enable location first");
                        return;
                    }

                    WA.send(`📍 My current location: https://maps.google.com/?q=${g.lat},${g.lng}`);
                },

                shareRefer(code) {
                    WA.send(`🎁 Join Mana Hub with my referral code: *${code}*\nVisit: www.mana.delivery`);
                },

                /* TOAST */

                toast(msg) {
                    const t = document.getElementById("toast");

                    t.textContent = msg;
                    t.classList.remove("hidden");

                    clearTimeout(this._toastT);

                    this._toastT = setTimeout(() => t.classList.add("hidden"), 2200);
                },
            };

            /* ---------- START ---------- */

            document.addEventListener("DOMContentLoaded", () => App.init());
        </script>
    </body>
</html>
